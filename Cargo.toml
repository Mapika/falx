[package]
name = "vexel"
version = "0.1.0"
edition = "2024"
description = "M0 spike: hand-written SIMD CSV structural indexer (simdjson-style bitstream kernel)"
license = "MIT OR Apache-2.0"

[dependencies]
toml = { version = "0.8", default-features = true, optional = true }

[dev-dependencies]
csv = "1"
serde_json = "1"

[features]
cli = ["dep:toml"]

[[bin]]
name = "vexel"
path = "src/bin/vexel.rs"
required-features = ["cli"]

[profile.release]
codegen-units = 1
lto = "thin"
