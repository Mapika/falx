# RFC 4180 CSV with a typed columnar projection: matches the checked-in
# `csv_typed` kernel (regenerated by `cargo run --example generate`).
name = "csv_typed"
structural = [",", "\n"]
quote = "\""
escape = "doubled"

[[columns]]
index = 0
type = "i64"
name = "id"

[[columns]]
index = 1
type = "string"
name = "title"

[[columns]]
index = 2
type = "f64"
name = "value"

[[columns]]
index = 4
type = "bytes"
name = "label"
